services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aigenie-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-aigenie}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aigenie-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aigenie-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-aigenie}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: 7d
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_TIMEOUT_MS: 600000
      OLLAMA_NUM_PREDICT: -1
      OLLAMA_NUM_CTX: 8192
      SAVE_CONTENT_HISTORY: true
      IMAGE_SERVICE_URL: http://host.docker.internal:7860
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-aigenieexpert@gmail.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-aigenieexpert@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-wjfr pnqh wrkb kdgg}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-aigenieexpert@gmail.com}
    volumes:
      - generated_images:/app/uploads/generated-images
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aigenie-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  generated_images:
    driver: local

networks:
  aigenie-network:
    driver: bridge

