services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aigenie-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-aigenie}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - aigenie-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development mode with nodemon)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aigenie-backend-dev
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: development
      PORT: 5001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-aigenie}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_EXPIRES_IN: 7d
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_TIMEOUT_MS: 600000
      OLLAMA_NUM_PREDICT: -1
      OLLAMA_NUM_CTX: 8192
      SAVE_CONTENT_HISTORY: true
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aigenie-network-dev
    command: npm run dev

volumes:
  postgres_data_dev:
    driver: local

networks:
  aigenie-network-dev:
    driver: bridge

